<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Logos - Chaitra Soft Admin</title>
  <link rel="icon" type="image/jpeg" href="../assets/logo.jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="admin-style.css" rel="stylesheet" />
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="../assets/logo.jpeg" alt="Logo" />
        <div>
          <span>Chaitra Soft</span>
          <small>Admin Panel</small>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a href="jobs.html"><i class="fas fa-briefcase"></i> Job Openings</a>
        <a href="submissions.html"><i class="fas fa-file-lines"></i> Submissions</a>
        <a href="clients.html"><i class="fas fa-building"></i> Client Logos</a>
        <a href="reviews.html"><i class="fas fa-star"></i> Testimonials</a>
        <a href="settings.html"><i class="fas fa-gear"></i> Settings</a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> Sign Out</a>
      </div>
    </aside>

    <div class="sidebar-overlay"></div>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger"><i class="fas fa-bars"></i></button>
          <h1 class="topbar-title">Client Logos</h1>
        </div>
        <div class="topbar-right">
          <div class="topbar-user">
            <span>Admin</span>
            <div class="topbar-avatar">A</div>
          </div>
        </div>
      </header>

      <div class="page-content">
        <div class="page-header">
          <div>
            <h2>Client Logos</h2>
            <p id="clientsCount">Manage client logos displayed on your site</p>
          </div>
          <button class="btn btn-primary" onclick="showClientModal()"><i class="fas fa-plus"></i> Add Logo</button>
        </div>

        <div id="alertContainer"></div>

        <div id="clientsGrid" class="grid-cards"></div>
        <div id="clientsEmpty" class="empty-state" style="display:none;">
          <i class="fas fa-building"></i>
          <h3>No client logos yet</h3>
          <p>Click "Add Logo" to add your first client.</p>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <!-- Client Modal -->
  <div id="clientModal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:500px;">
      <h3 id="clientModalTitle">Add Client Logo</h3>
      <form id="clientForm" style="margin-top:16px;">
        <div class="form-group">
          <label>Client Name</label>
          <input type="text" id="clientName" required />
        </div>
        <div class="form-group">
          <label>Alt Text</label>
          <input type="text" id="clientAltText" />
        </div>
        <div class="form-group">
          <label>Section</label>
          <select id="clientSection">
            <option value="home">Home</option>
            <option value="about">About</option>
            <option value="services">Services</option>
          </select>
        </div>
        <div class="form-group">
          <label>Display Order</label>
          <input type="number" id="clientOrder" value="1" />
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:8px;">
          <input type="checkbox" id="clientActive" checked />
          <label for="clientActive" style="margin:0;">Active</label>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
          <button type="button" class="btn btn-secondary" onclick="closeClientModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="admin-script.js"></script>
  <script>
    let editingClientId = null;

    function renderClients() {
      const clients = getData('chaitra_clients', []);
      document.getElementById('clientsCount').textContent = `${clients.length} logo${clients.length !== 1 ? 's' : ''}`;
      const grid = document.getElementById('clientsGrid');
      const empty = document.getElementById('clientsEmpty');
      if (clients.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      grid.innerHTML = clients.sort((a,b) => a.displayOrder - b.displayOrder).map(c => `
        <div class="grid-item">
          <div class="grid-img" style="display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--primary-light);">
            <i class="fas fa-building"></i>
          </div>
          <div class="grid-body">
            <h4>${c.name}</h4>
            <p>${c.altText || c.name}</p>
            <div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap;">
              <span class="badge badge-blue">${c.section}</span>
              <span class="badge ${c.active ? 'badge-green' : 'badge-slate'}">${c.active ? 'Active' : 'Inactive'}</span>
              <span class="badge badge-slate">Order: ${c.displayOrder}</span>
            </div>
          </div>
          <div class="grid-footer">
            <button class="btn-icon edit" onclick="editClient('${c.id}')" title="Edit"><i class="fas fa-pen"></i></button>
            <button class="btn-icon delete" onclick="deleteClient('${c.id}')" title="Delete"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      `).join('');
    }

    function showClientModal(data = null) {
      editingClientId = data ? data.id : null;
      document.getElementById('clientModalTitle').textContent = data ? 'Edit Client Logo' : 'Add Client Logo';
      document.getElementById('clientName').value = data ? data.name : '';
      document.getElementById('clientAltText').value = data ? data.altText : '';
      document.getElementById('clientSection').value = data ? data.section : 'home';
      document.getElementById('clientOrder').value = data ? data.displayOrder : 1;
      document.getElementById('clientActive').checked = data ? data.active : true;
      document.getElementById('clientModal').style.display = 'flex';
    }

    function closeClientModal() {
      document.getElementById('clientModal').style.display = 'none';
      editingClientId = null;
    }

    document.getElementById('clientForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const clients = getData('chaitra_clients', []);
      const data = {
        name: document.getElementById('clientName').value,
        altText: document.getElementById('clientAltText').value,
        section: document.getElementById('clientSection').value,
        displayOrder: parseInt(document.getElementById('clientOrder').value) || 1,
        active: document.getElementById('clientActive').checked,
      };

      if (editingClientId) {
        const idx = clients.findIndex(c => c.id === editingClientId);
        if (idx > -1) clients[idx] = { ...clients[idx], ...data };
        setData('chaitra_clients', clients);
        toast('Logo updated!', 'success');
      } else {
        data.id = generateId();
        data.createdAt = new Date().toISOString();
        clients.push(data);
        setData('chaitra_clients', clients);
        toast('Logo added!', 'success');
      }
      closeClientModal();
      renderClients();
    });

    function editClient(id) {
      const clients = getData('chaitra_clients', []);
      const c = clients.find(x => x.id === id);
      if (c) showClientModal(c);
    }

    async function deleteClient(id) {
      const confirmed = await confirmAction('Delete this client logo?');
      if (!confirmed) return;
      let clients = getData('chaitra_clients', []);
      clients = clients.filter(c => c.id !== id);
      setData('chaitra_clients', clients);
      renderClients();
      toast('Logo deleted.', 'info');
    }

    document.addEventListener('DOMContentLoaded', renderClients);
  </script>
</body>
</html>
