<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Openings - Chaitra Soft Admin</title>
  <link rel="icon" type="image/jpeg" href="../assets/logo.jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="admin-style.css" rel="stylesheet" />
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="../assets/logo.jpeg" alt="Logo" />
        <div>
          <span>Chaitra Soft</span>
          <small>Admin Panel</small>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a href="jobs.html"><i class="fas fa-briefcase"></i> Job Openings</a>
        <a href="submissions.html"><i class="fas fa-file-lines"></i> Submissions</a>
        <a href="clients.html"><i class="fas fa-building"></i> Client Logos</a>
        <a href="reviews.html"><i class="fas fa-star"></i> Testimonials</a>
        <a href="settings.html"><i class="fas fa-gear"></i> Settings</a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> Sign Out</a>
      </div>
    </aside>

    <div class="sidebar-overlay"></div>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger"><i class="fas fa-bars"></i></button>
          <h1 class="topbar-title">Job Openings</h1>
        </div>
        <div class="topbar-right">
          <div class="topbar-user">
            <span>Admin</span>
            <div class="topbar-avatar">A</div>
          </div>
        </div>
      </header>

      <div class="page-content">
        <div class="page-header">
          <div>
            <h2>Job Openings</h2>
            <p id="jobsCount">Manage your job listings</p>
          </div>
          <button class="btn btn-primary" onclick="showJobModal()"><i class="fas fa-plus"></i> New Job</button>
        </div>

        <div id="alertContainer"></div>

        <div class="card">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Category</th>
                  <th>Location</th>
                  <th>Type</th>
                  <th>Status</th>
                  <th style="text-align:right;">Actions</th>
                </tr>
              </thead>
              <tbody id="jobsTableBody"></tbody>
            </table>
          </div>
          <div id="jobsEmpty" class="empty-state" style="display:none;">
            <i class="fas fa-briefcase"></i>
            <h3>No job openings yet</h3>
            <p>Click "New Job" to create your first listing.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <!-- Job Modal -->
  <div id="jobModal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:600px;">
      <h3 id="jobModalTitle">New Job Opening</h3>
      <form id="jobForm" style="margin-top:16px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group" style="grid-column:1/-1;">
            <label>Job Title</label>
            <input type="text" id="jobTitle" required />
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="jobCategory">
              <option>Software</option>
              <option>HR</option>
              <option>Marketing</option>
              <option>Mobile</option>
              <option>Web</option>
              <option>Staffing</option>
            </select>
          </div>
          <div class="form-group">
            <label>Type</label>
            <select id="jobType">
              <option>Full-time</option>
              <option>Part-time</option>
              <option>Contract</option>
              <option>Internship</option>
            </select>
          </div>
          <div class="form-group">
            <label>Location</label>
            <input type="text" id="jobLocation" required />
          </div>
          <div class="form-group">
            <label>Sort Order</label>
            <input type="number" id="jobSortOrder" value="0" />
          </div>
          <div class="form-group" style="grid-column:1/-1;">
            <label>Tools / Technologies (comma separated)</label>
            <input type="text" id="jobTools" placeholder="e.g. React, Node.js, Python" />
          </div>
          <div class="form-group" style="grid-column:1/-1;">
            <label>Badge Label (optional)</label>
            <input type="text" id="jobBadge" placeholder="e.g. New, Hot, Urgent" />
          </div>
          <div class="form-group">
            <label>Badge Color</label>
            <select id="jobBadgeColor">
              <option value="green">Green</option>
              <option value="red">Red</option>
              <option value="amber">Amber</option>
              <option value="blue">Blue</option>
              <option value="purple">Purple</option>
            </select>
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:8px;padding-top:24px;">
            <input type="checkbox" id="jobActive" checked />
            <label for="jobActive" style="margin:0;">Active</label>
          </div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
          <button type="button" class="btn btn-secondary" onclick="closeJobModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="admin-script.js"></script>
  <script>
    let editingJobId = null;

    function renderJobs() {
      const jobs = getData('chaitra_jobs', []);
      document.getElementById('jobsCount').textContent = `${jobs.length} job${jobs.length !== 1 ? 's' : ''}`;
      const tbody = document.getElementById('jobsTableBody');
      const empty = document.getElementById('jobsEmpty');
      if (jobs.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      tbody.innerHTML = jobs.sort((a,b) => a.sortOrder - b.sortOrder).map(j => {
        const badgeColors = { green: 'badge-green', red: 'badge-red', amber: 'badge-amber', blue: 'badge-blue', purple: 'badge-purple' };
        return `<tr>
          <td>
            <div style="font-weight:500;">${j.title}</div>
            ${j.tools && j.tools.length ? `<div class="tool-tags">${j.tools.map(t => `<span class="tool-tag">${t}</span>`).join('')}</div>` : ''}
          </td>
          <td><span class="badge badge-blue">${j.category}</span></td>
          <td>${j.location}</td>
          <td>${j.type}</td>
          <td>
            ${j.badge ? `<span class="badge ${badgeColors[j.badgeColor] || 'badge-green'}">${j.badge}</span> ` : ''}
            <span class="badge ${j.active ? 'badge-green' : 'badge-slate'}">${j.active ? 'Active' : 'Inactive'}</span>
          </td>
          <td style="text-align:right;">
            <button class="btn-icon edit" onclick="editJob('${j.id}')" title="Edit"><i class="fas fa-pen"></i></button>
            <button class="btn-icon delete" onclick="deleteJob('${j.id}')" title="Delete"><i class="fas fa-trash"></i></button>
          </td>
        </tr>`;
      }).join('');
    }

    function showJobModal(data = null) {
      editingJobId = data ? data.id : null;
      document.getElementById('jobModalTitle').textContent = data ? 'Edit Job Opening' : 'New Job Opening';
      document.getElementById('jobTitle').value = data ? data.title : '';
      document.getElementById('jobCategory').value = data ? data.category : 'Software';
      document.getElementById('jobType').value = data ? data.type : 'Full-time';
      document.getElementById('jobLocation').value = data ? data.location : '';
      document.getElementById('jobSortOrder').value = data ? data.sortOrder : 0;
      document.getElementById('jobTools').value = data && data.tools ? data.tools.join(', ') : '';
      document.getElementById('jobBadge').value = data ? data.badge : '';
      document.getElementById('jobBadgeColor').value = data ? data.badgeColor : 'green';
      document.getElementById('jobActive').checked = data ? data.active : true;
      document.getElementById('jobModal').style.display = 'flex';
    }

    function closeJobModal() {
      document.getElementById('jobModal').style.display = 'none';
      editingJobId = null;
    }

    document.getElementById('jobForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const jobs = getData('chaitra_jobs', []);
      const tools = document.getElementById('jobTools').value.split(',').map(t => t.trim()).filter(Boolean);
      const data = {
        title: document.getElementById('jobTitle').value,
        category: document.getElementById('jobCategory').value,
        type: document.getElementById('jobType').value,
        location: document.getElementById('jobLocation').value,
        sortOrder: parseInt(document.getElementById('jobSortOrder').value) || 0,
        tools,
        badge: document.getElementById('jobBadge').value,
        badgeColor: document.getElementById('jobBadgeColor').value,
        active: document.getElementById('jobActive').checked,
      };

      if (editingJobId) {
        const idx = jobs.findIndex(j => j.id === editingJobId);
        if (idx > -1) { jobs[idx] = { ...jobs[idx], ...data }; }
        setData('chaitra_jobs', jobs);
        toast('Job updated successfully!', 'success');
      } else {
        data.id = generateId();
        data.createdAt = new Date().toISOString();
        jobs.push(data);
        setData('chaitra_jobs', jobs);
        toast('Job created successfully!', 'success');
      }
      closeJobModal();
      renderJobs();
    });

    function editJob(id) {
      const jobs = getData('chaitra_jobs', []);
      const job = jobs.find(j => j.id === id);
      if (job) showJobModal(job);
    }

    async function deleteJob(id) {
      const confirmed = await confirmAction('Are you sure you want to delete this job opening?');
      if (!confirmed) return;
      let jobs = getData('chaitra_jobs', []);
      jobs = jobs.filter(j => j.id !== id);
      setData('chaitra_jobs', jobs);
      renderJobs();
      toast('Job deleted.', 'info');
    }

    document.addEventListener('DOMContentLoaded', renderJobs);
  </script>
</body>
</html>
