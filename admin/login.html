<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Chaitra Soft</title>
  <link rel="icon" type="image/jpeg" href="../assets/logo.jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="admin-style.css" rel="stylesheet" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="../assets/logo.jpeg" alt="Chaitra Soft" />
      <h1>Chaitra Soft Admin</h1>
      <p>Sign in to manage your website</p>
    </div>

    <div class="login-error" id="loginError"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@chaitrasoft.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="admin123" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">
        <i class="fas fa-lock"></i> Sign In
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--text-light);">
      Demo: admin@chaitrasoft.com / admin123
    </p>
  </div>

  <script src="admin-script.js"></script>
</body>
</html>
