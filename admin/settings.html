<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - Chaitra Soft Admin</title>
  <link rel="icon" type="image/jpeg" href="../assets/logo.jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="admin-style.css" rel="stylesheet" />
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="../assets/logo.jpeg" alt="Logo" />
        <div>
          <span>Chaitra Soft</span>
          <small>Admin Panel</small>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a href="jobs.html"><i class="fas fa-briefcase"></i> Job Openings</a>
        <a href="submissions.html"><i class="fas fa-file-lines"></i> Submissions</a>
        <a href="clients.html"><i class="fas fa-building"></i> Client Logos</a>
        <a href="reviews.html"><i class="fas fa-star"></i> Testimonials</a>
        <a href="settings.html"><i class="fas fa-gear"></i> Settings</a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> Sign Out</a>
      </div>
    </aside>

    <div class="sidebar-overlay"></div>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger"><i class="fas fa-bars"></i></button>
          <h1 class="topbar-title">Settings</h1>
        </div>
        <div class="topbar-right">
          <div class="topbar-user">
            <span>Admin</span>
            <div class="topbar-avatar">A</div>
          </div>
        </div>
      </header>

      <div class="page-content" style="max-width:800px;">
        <div class="page-header">
          <div>
            <h2>Settings</h2>
            <p>Manage your site-wide configuration</p>
          </div>
        </div>

        <div id="alertContainer"></div>

        <form id="settingsForm">
          <div class="settings-section">
            <h3>General</h3>
            <p>Basic site information</p>
            <div class="settings-card">
              <div class="form-group">
                <label>Site Title</label>
                <input type="text" id="setSiteTitle" />
              </div>
              <div class="form-group">
                <label>Tagline</label>
                <input type="text" id="setTagline" />
              </div>
            </div>
          </div>

          <div class="settings-section">
            <h3>Contact</h3>
            <p>Your contact information</p>
            <div class="settings-card">
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="setEmail" />
              </div>
              <div class="form-group">
                <label>Phone</label>
                <input type="text" id="setPhone" />
              </div>
              <div class="form-group">
                <label>Address</label>
                <input type="text" id="setAddress" />
              </div>
            </div>
          </div>

          <div class="settings-section">
            <h3>Social Media</h3>
            <p>Your social media links</p>
            <div class="settings-card">
              <div class="form-group">
                <label><i class="fab fa-linkedin" style="color:#0a66c2;"></i> LinkedIn URL</label>
                <input type="url" id="setLinkedin" />
              </div>
              <div class="form-group">
                <label><i class="fab fa-twitter" style="color:#1da1f2;"></i> Twitter URL</label>
                <input type="url" id="setTwitter" />
              </div>
              <div class="form-group">
                <label><i class="fab fa-facebook" style="color:#1877f2;"></i> Facebook URL</label>
                <input type="url" id="setFacebook" />
              </div>
              <div class="form-group">
                <label><i class="fab fa-instagram" style="color:#e4405f;"></i> Instagram URL</label>
                <input type="url" id="setInstagram" />
              </div>
            </div>
          </div>

          <div style="display:flex;gap:8px;justify-content:flex-end;margin-bottom:40px;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save All Settings</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="admin-script.js"></script>
  <script>
    function loadSettings() {
      const settings = getData('chaitra_settings', {});
      document.getElementById('setSiteTitle').value = settings.siteTitle || '';
      document.getElementById('setTagline').value = settings.tagline || '';
      document.getElementById('setEmail').value = settings.email || '';
      document.getElementById('setPhone').value = settings.phone || '';
      document.getElementById('setAddress').value = settings.address || '';
      document.getElementById('setLinkedin').value = settings.linkedin || '';
      document.getElementById('setTwitter').value = settings.twitter || '';
      document.getElementById('setFacebook').value = settings.facebook || '';
      document.getElementById('setInstagram').value = settings.instagram || '';
    }

    document.getElementById('settingsForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const settings = {
        siteTitle: document.getElementById('setSiteTitle').value,
        tagline: document.getElementById('setTagline').value,
        email: document.getElementById('setEmail').value,
        phone: document.getElementById('setPhone').value,
        address: document.getElementById('setAddress').value,
        linkedin: document.getElementById('setLinkedin').value,
        twitter: document.getElementById('setTwitter').value,
        facebook: document.getElementById('setFacebook').value,
        instagram: document.getElementById('setInstagram').value,
      };
      setData('chaitra_settings', settings);
      toast('Settings saved successfully!', 'success');
    });

    document.addEventListener('DOMContentLoaded', loadSettings);
  </script>
</body>
</html>
